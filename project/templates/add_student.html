{% extends "base.html" %}
{% block page_title %}<h2 class="fw-bold mb-0">{{ title }}</h2>{% endblock %}
{% block breadcrumbs %}
  <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
  <li class="breadcrumb-item"><a href="{{ url_for('students') }}">Students</a></li>
  <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <form method="POST" action="">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-user me-2"></i>Personal Information</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label fw-bold small">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="Enter student's full name">
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label fw-bold small">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="email@example.com">
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label fw-bold small">Phone Number</label>
                            <input type="text" class="form-control" id="phone" name="phone" required placeholder="+1234567890">
                        </div>
                        <div class="col-md-3">
                            <label for="date_of_birth" class="form-label fw-bold small">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth">
                        </div>
                        <div class="col-md-3">
                            <label for="gender" class="form-label fw-bold small">Gender</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="address" class="form-label fw-bold small">Residential Address</label>
                            <textarea class="form-control" id="address" name="address" rows="2" placeholder="Full street address, city, state, zip"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-graduation-cap me-2"></i>Academic Details</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="registration_number" class="form-label fw-bold small">Registration Number</label>
                            <input type="text" class="form-control" id="registration_number" name="registration_number">
                        </div>
                        <div class="col-md-4">
                            <label for="roll_number" class="form-label fw-bold small">Roll Number</label>
                            <input type="text" class="form-control" id="roll_number" name="roll_number">
                        </div>
                        <div class="col-md-4">
                            <label for="department_id" class="form-label fw-bold small">Department</label>
                            <select class="form-select" id="department_id" name="department_id">
                                <option value="">Select Department</option>
                                {% for dept in departments %}
                                <option value="{{ dept.id }}">{{ dept.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="current_year" class="form-label fw-bold small">Current Year</label>
                            <input type="number" class="form-control" id="current_year" name="current_year" min="1" max="5">
                        </div>
                        <div class="col-md-4">
                            <label for="current_semester" class="form-label fw-bold small">Current Semester</label>
                            <input type="number" class="form-control" id="current_semester" name="current_semester" min="1" max="10">
                        </div>
                        <div class="col-md-4">
                            <label for="section" class="form-label fw-bold small">Section</label>
                            <input type="text" class="form-control" id="section" name="section" placeholder="e.g. A, B, C">
                        </div>
                        <div class="col-md-6">
                            <label for="faculty_id" class="form-label fw-bold small">Assigned Tutor</label>
                            <select class="form-select" id="faculty_id" name="faculty_id">
                                <option value="">Auto-assign</option>
                                {% for faculty in faculties %}
                                <option value="{{ faculty.id }}">{{ faculty.name }} ({{ faculty.department or 'No Dept' }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="status" class="form-label fw-bold small">Enrollment Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                                <option value="graduated">Graduated</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-users me-2"></i>Guardian & Emergency Contact</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="guardian_name" class="form-label fw-bold small">Guardian Name</label>
                            <input type="text" class="form-control" id="guardian_name" name="guardian_name">
                        </div>
                        <div class="col-md-6">
                            <label for="guardian_phone" class="form-label fw-bold small">Guardian Phone</label>
                            <input type="text" class="form-control" id="guardian_phone" name="guardian_phone">
                        </div>
                        <div class="col-md-6">
                            <label for="emergency_contact_name" class="form-label fw-bold small">Emergency Contact Name</label>
                            <input type="text" class="form-control" id="emergency_contact_name" name="emergency_contact_name">
                        </div>
                        <div class="col-md-6">
                            <label for="emergency_contact_phone" class="form-label fw-bold small">Emergency Contact Phone</label>
                            <input type="text" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone">
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mb-5">
                <a href="{{ url_for('students') }}" class="btn btn-light border px-4">Cancel</a>
                <button type="submit" class="btn btn-primary px-5">Save Student Record</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
